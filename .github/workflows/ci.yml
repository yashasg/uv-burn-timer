name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint (HIG rules at error severity — hard block)
        run: swiftlint --strict --config .swiftlint.yml
      - name: Build and test
        run: ./build.sh
